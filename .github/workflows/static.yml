name: Deploy static content to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate sitemap
        uses: cicirello/generate-sitemap@v1.10.4
        with:
          base-url-path: "https://rutvij-a.github.io/Portfolio"
          path-to-root: "."

      # 🔍 Debug: confirm sitemap content
      - name: Show sitemap
        run: cat sitemap.xml

      # 🚀 Deploy directly (NO site folder)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4